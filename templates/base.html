<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PawDetect{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #09090F;
    --surface: #111119;
    --card:    #17171F;
    --ink:     #EEEEF5;
    --muted:   #6A6A90;
    --line:    #22222E;
    --cat:     #FF6030;
    --dog:     #2EA8FF;
    --cat-dim: rgba(255,96,48,.12);
    --dog-dim: rgba(46,168,255,.12);
    --white:   #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    animation: pageFade .4s ease both;
  }

  @keyframes pageFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(9,9,15,.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    display: flex;
    align-items: center;
    height: 60px;
    gap: 40px;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--ink);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .nav-logo .paw { font-size: 20px; }

  .nav-links {
    display: flex;
    gap: 4px;
    list-style: none;
    margin-left: auto;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    transition: color .2s, background .2s;
    position: relative;
  }

  .nav-links a:hover { color: var(--ink); background: var(--card); }

  .nav-links a.active {
    color: var(--ink);
    background: var(--card);
  }

  .nav-links a.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 14px;
    right: 14px;
    height: 2px;
    background: linear-gradient(90deg, var(--cat), var(--dog));
    border-radius: 2px;
  }

  /* ── MAIN ── */
  main { flex: 1; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  footer span { font-family: 'Syne', sans-serif; font-weight: 600; }

  .footer-badges {
    display: flex;
    gap: 8px;
  }

  .badge {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── SHARED UTILS ── */
  .section-eyebrow {
    font-family: 'Inter', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .cat-text  { color: var(--cat); }
  .dog-text  { color: var(--dog); }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .tag-cat { background: var(--cat-dim); color: var(--cat); border: 1px solid rgba(255,96,48,.25); }
  .tag-dog { background: var(--dog-dim); color: var(--dog); border: 1px solid rgba(46,168,255,.25); }

  /* ── CONFIDENCE BAR ── */
  .conf-bar-wrap {
    background: var(--line);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .conf-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(.16,1,.3,1);
    width: 0;
  }

  .conf-bar.cat { background: linear-gradient(90deg, #FF4500, var(--cat)); }
  .conf-bar.dog { background: linear-gradient(90deg, #0090FF, var(--dog)); }
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <span class="paw">🐾</span> PawDetect
  </a>
  <ul class="nav-links">
    <li><a href="/"        class="{{ 'active' if request.endpoint == 'index'   }}">Classify</a></li>
    <li><a href="/about"   class="{{ 'active' if request.endpoint == 'about'   }}">About</a></li>
    <li><a href="/history" class="{{ 'active' if request.endpoint == 'history' }}">History</a></li>
    <li><a href="/contact" class="{{ 'active' if request.endpoint == 'contact' }}">Contact</a></li>
  </ul>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer>
  <span>PawDetect</span>
  <div class="footer-badges">
    <span class="badge">Flask</span>
    <span class="badge">Custom CNN</span>
    <span class="badge">TensorFlow</span>
  </div>
</footer>

</body>
</html>
